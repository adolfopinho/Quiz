<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card" aria-live="polite">
        <header class="card__header">
          <p class="badge">Quiz de Carreira</p>
          <h1>Qual é o seu perfil profissional?</h1>
          <p class="subtitle" id="progress-text">Pergunta 1 de 6</p>
        </header>

        <div id="quiz-screen">
          <h2 id="question" class="question"></h2>
          <div id="answers" class="answers"></div>
        </div>

        <div id="result-screen" class="result hidden">
          <h2 id="result-title"></h2>
          <p id="result-description"></p>
          <p id="score-line" class="score"></p>
        </div>

        <footer class="card__footer">
          <button id="restart-btn" class="btn btn--ghost hidden" type="button">
            Refazer quiz
          </button>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
